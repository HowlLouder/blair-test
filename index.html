<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Mock Up</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f4f4f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 1.5rem;
      letter-spacing: 0.02em;
    }

    .mockup-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 0;
      padding-top: 100%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      border-radius: 8px;
      overflow: hidden;
    }

    .mockup-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>Website Mock Up</h1>

  <div class="mockup-wrapper">
    <iframe
      loading="lazy"
      src="https://www.canva.com/design/DAHJpDTVwV4/gbpyZoGGquY6Y6zNGW69Sg/view?embed"
      allowfullscreen="allowfullscreen"
      allow="fullscreen"
    ></iframe>
  </div>

  <footer>Design by Jessica Wortelmann</footer>
</body>
</html>
